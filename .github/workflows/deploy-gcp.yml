name: Deploy to GCP VM

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-gcp-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCP_VM_HOST }}
          username: ${{ secrets.GCP_VM_USER }}
          key: ${{ secrets.GCP_VM_SSH_KEY }}
          port: ${{ secrets.GCP_VM_SSH_PORT || 22 }}
          script_stop: true
          script: |
            set -euo pipefail
            PROJECT_DIR="${{ secrets.GCP_PROJECT_DIR }}"
            if [ -z "$PROJECT_DIR" ]; then PROJECT_DIR="$HOME/retail-stream-fastapi"; fi

            cd "$PROJECT_DIR"
            bash scripts/deploy_on_vm.sh
