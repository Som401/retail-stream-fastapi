# Docker's embedded DNS for dynamic upstream resolution across all app replicas.
resolver 127.0.0.11 valid=5s ipv6=off;

server {
    listen 80 reuseport;
    set $upstream_app app;

    location / {
        proxy_pass http://$upstream_app:8000;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_connect_timeout 2s;
        proxy_read_timeout 20s;
        proxy_send_timeout 20s;

        proxy_buffering off;
    }

    location /health {
        proxy_pass http://$upstream_app:8000/health;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    location /metrics {
        proxy_pass http://$upstream_app:8000/metrics;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }
}
