# Docker's embedded DNS. Variable in proxy_pass forces re-resolution so
# traffic spreads across all scaled replicas (--scale app=3), not one.
resolver 127.0.0.11 valid=5s ipv6=off;

server {
    listen 80;
    set $upstream_app app;

    location / {
        proxy_pass http://$upstream_app:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    location /health {
        proxy_pass http://$upstream_app:8000/health;
    }
}
